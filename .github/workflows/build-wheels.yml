name: Build and Release Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  build_wheels:
    name: Build wheel on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel Cython

      - name: Show build environment
        run: |
          python --version
          python -m pip --version
          python -c "from pathlib import Path; print('setup.py:', Path('setup.py').exists()); print('pyproject.toml:', Path('pyproject.toml').exists()); print('package:', Path('SQLManager').exists())"

      - name: Build wheels
        run: python -m pip wheel . --wheel-dir dist --no-deps --no-build-isolation -vvv

      - name: List built wheels
        if: always()
        run: python -c "from pathlib import Path; wheels=list(Path('dist').glob('*.whl')); print('Wheels found:', len(wheels)); [print(p) for p in wheels]"

      - name: Upload built wheels
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: ignore

  upload_to_release:
    name: Upload wheels to GitHub Release
    needs: build_wheels
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Check generated wheels
        id: wheels
        shell: bash
        run: |
          mkdir -p dist
          count=$(find dist -name "*.whl" -type f | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Wheels found: $count"
          find dist -name "*.whl" -type f -print

      - name: Upload wheels to release
        if: steps.wheels.outputs.count != '0'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release upload when no wheels were built
        if: steps.wheels.outputs.count == '0'
        run: echo "No wheels were built, so nothing will be uploaded to the release."
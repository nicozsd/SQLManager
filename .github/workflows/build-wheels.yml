name: Build and Release Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CIBW_BUILD: "cp310-* cp311-* cp312-*"
  CIBW_SKIP: "*-musllinux_* *-win32"
  CIBW_ARCHS_LINUX: "x86_64"
  CIBW_ARCHS_WINDOWS: "AMD64"
  CIBW_BUILD_VERBOSITY: "3"
  CIBW_BUILD_FRONTEND: "pip"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build cibuildwheel

      - name: Validate package metadata
        run: python -m build --sdist --outdir precheck-dist -vv

      - name: Build wheels
        shell: bash
        run: |
          mkdir -p dist
          python -m cibuildwheel --output-dir dist 2>&1 | tee cibuildwheel.log
          exit_code=${PIPESTATUS[0]}
          echo "cibuildwheel exit code: $exit_code"
          exit $exit_code
        env:
          CIBW_BEFORE_BUILD: "python -m pip install --upgrade pip setuptools wheel Cython"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-logs-${{ matrix.os }}
          path: |
            cibuildwheel.log
            precheck-dist/*
          if-no-files-found: ignore

      - name: Upload built wheels
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: ignore

  upload_to_release:
    name: Upload wheels to GitHub Release
    needs: build_wheels
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Check generated wheels
        id: wheels
        shell: bash
        run: |
          mkdir -p dist
          count=$(find dist -name "*.whl" -type f | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Wheels found: $count"
          find dist -name "*.whl" -type f -print

      - name: Upload wheels to release
        if: steps.wheels.outputs.count != '0'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release upload when no wheels were built
        if: steps.wheels.outputs.count == '0'
        run: echo "No wheels were built, so nothing will be uploaded to the release."